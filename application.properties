# log
logging.file.name=log
logging.level.org.springframework.web=INFO
logging.level.javax.jmdns=WARN
logging.level.com.github.serezhka=DEBUG
logging.level.io.netty=INFO
logging.level.io.netty.handler.logging.LoggingHandler=INFO
logging.level.org.freedesktop.gstreamer=INFO
spring.output.ansi.enabled=ALWAYS
# airplay
airplay.serverName=走马灯
airplay.width=1920
airplay.height=1080
airplay.fps=60
# 横屏模式：启用后 width/height 自动交换并应用旋转滤镜
airplay.landscape=false
# player (gstreamer=完整音视频+横屏, ffmpeg=音频(Java Sound API)+视频需ffplay, vlc, h264-dump)
player.implementation=gstreamer
player.tray.enabled=true
player.gstreamer.swing=false
